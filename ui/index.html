<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blue Dove</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header>
        <h1>Blue Dove</h1>
        <p>Activity Tracker</p>
    </header>
    
    <div class="controls">
        <select id="db"><option value="main">Usage Data</option><option value="sample">Sample Data</option></select>
        <select id="date"><option>Loading...</option></select>
    </div>
    
    <div class="tabs">
        <button class="tab active" data-view="trends">Last 7 Days</button>
        <button class="tab" data-view="pie">Pie</button>
        <button class="tab" data-view="bar">Bar</button>
        <button class="tab" data-view="doughnut">Doughnut</button>
        <button class="tab" data-view="table">Table</button>
    </div>
    
    <div class="stats">
        <div class="stat"><h3>Total Time</h3><div class="value" id="total">-</div></div>
        <div class="stat"><h3>Apps Used</h3><div class="value" id="apps">-</div></div>
        <div class="stat featured"><h3>Top App</h3><div class="value" id="top">-</div></div>
    </div>
    
    <div class="view-container">
        <div id="view-trends" class="view active">
            <div class="trends-container">
                <div class="card">
                    <h2>Last 7 Days</h2>
                    <canvas id="trendsChart"></canvas>
                </div>
                <div class="card">
                    <h2>Daily Breakdown</h2>
                    <canvas id="stackedChart"></canvas>
                </div>
            </div>
        </div>
        
        <div id="view-pie" class="view">
            <div class="full-chart">
                <div class="card">
                    <h2>Pie Chart</h2>
                    <div class="donut-center">
                        <canvas id="chartPie"></canvas>
                        <div class="donut-text"><div class="num" id="chartNumPie">-</div><div class="label">Hours</div></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="view-bar" class="view">
            <div class="full-chart">
                <div class="card">
                    <h2>Bar Graph</h2>
                    <canvas id="chartBar"></canvas>
                </div>
            </div>
        </div>
        
        <div id="view-doughnut" class="view">
            <div class="full-chart">
                <div class="card">
                    <h2>Doughnut Chart</h2>
                    <div class="donut-center">
                        <canvas id="chartDoughnut"></canvas>
                        <div class="donut-text"><div class="num" id="chartNumDoughnut">-</div><div class="label">Hours</div></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="view-table" class="view">
            <div class="full-table">
                <div class="card">
                    <h2>Usage Breakdown</h2>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>App</th><th>Time</th><th>%</th><th>Hours</th></tr></thead>
                            <tbody id="tableFull"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="activity">
        <h2>Recent Activity</h2>
        <div class="activity-list" id="activity"></div>
    </div>
    
    <footer>Blue Dove v2.0</footer>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
